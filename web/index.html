<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenVPN Web Controller</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="glow-bg"></div>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo-area">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    <path d="M12 8v4"/>
                    <path d="M12 16h.01"/>
                </svg>
                <h1>OpenVPN <span>Controller</span></h1>
            </div>
            <div class="system-status">
                <span class="status-dot disconnected" id="header-status-dot"></span>
                <span class="status-text" id="header-status-text">Disconnected</span>
            </div>
        </header>

        <main class="dashboard-grid">
            <!-- Left Panel: Connection Panel -->
            <section class="panel glass-card" id="connection-panel">
                <div class="panel-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="panel-icon">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <h2>VPN Configuration</h2>
                </div>
                
                <form id="vpn-form" onsubmit="event.preventDefault();">
                    <!-- Config Directory -->
                    <div class="form-group">
                        <label for="config-dir">Config Directory (Optional)</label>
                        <div class="input-wrapper">
                            <input type="text" id="config-dir" placeholder="e.g. /etc/openvpn (or leave empty to auto-detect)">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                            </svg>
                        </div>
                    </div>

                    <!-- Config Select -->
                    <div class="form-group">
                        <label for="config-select">OVPN Profile</label>
                        <div class="select-wrapper">
                            <div class="select-inner">
                                <select id="config-select" required>
                                    <option value="" disabled selected>Select a configuration file...</option>
                                </select>
                                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                    <polyline points="14 2 14 8 20 8"/>
                                    <line x1="16" y1="13" x2="8" y2="13"/>
                                    <line x1="16" y1="17" x2="8" y2="17"/>
                                    <polyline points="10 9 9 9 8 9"/>
                                </svg>
                            </div>
                            <button type="button" class="btn-icon" id="refresh-configs" title="Refresh list">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Account Select -->
                    <div class="form-group">
                        <label for="account-select">Saved Accounts</label>
                        <div class="select-wrapper">
                            <div class="select-inner">
                                <select id="account-select">
                                    <option value="" selected>-- Enter custom credentials --</option>
                                </select>
                                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                    <circle cx="12" cy="7" r="4"/>
                                </svg>
                            </div>
                            <button type="button" class="btn-icon" id="btn-save-account" title="Save current credentials to list">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                                    <polyline points="17 21 17 13 7 13 7 21"/>
                                    <polyline points="7 3 7 8 15 8"/>
                                </svg>
                            </button>
                            <button type="button" class="btn-icon" id="btn-delete-account" title="Delete selected account" style="display: none; color: var(--color-disconnected);">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="3 6 5 6 21 6"/>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                                    <line x1="10" y1="11" x2="10" y2="17"/>
                                    <line x1="14" y1="11" x2="14" y2="17"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Username -->
                    <div class="form-group">
                        <label for="username">Auth Username</label>
                        <div class="input-wrapper">
                            <input type="text" id="username" placeholder="Enter VPN Username" required autocomplete="username">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label for="password">Auth Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" placeholder="Enter VPN Password" required autocomplete="current-password">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                            <button type="button" class="toggle-password" id="toggle-password" title="Show/Hide Password">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-icon">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Save Credentials Checkbox -->
                    <div class="form-checkbox">
                        <label class="checkbox-container">
                            <input type="checkbox" id="save-credentials" checked>
                            <span class="checkmark"></span>
                            Save credentials securely on server
                        </label>
                    </div>

                    <!-- Action Buttons -->
                    <div class="action-buttons">
                        <button type="button" class="btn btn-primary" id="btn-connect">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="btn-icon-svg">
                                <polygon points="5 3 19 12 5 21 5 3"/>
                            </svg>
                            <span>Connect</span>
                        </button>
                        <button type="button" class="btn btn-danger" id="btn-disconnect" disabled>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="btn-icon-svg">
                                <rect x="4" y="4" width="16" height="16" rx="2" ry="2"/>
                            </svg>
                            <span>Disconnect</span>
                        </button>
                    </div>
                </form>
            </section>

            <!-- Right Panel: Info & Live Monitor -->
            <div class="right-column">
                <!-- Info Cards -->
                <div class="info-grid">
                    <!-- Status Card -->
                    <div class="info-card glass-card">
                        <div class="card-title">VPN State</div>
                        <div class="state-display">
                            <div class="state-glowing-ring disconnected" id="state-ring">
                                <div class="state-dot disconnected" id="state-dot"></div>
                            </div>
                            <div class="state-details">
                                <span class="state-name" id="state-name">DISCONNECTED</span>
                                <span class="state-sub" id="state-sub">Select profile and connect</span>
                            </div>
                        </div>
                    </div>

                    <!-- Stats Card -->
                    <div class="info-card glass-card">
                        <div class="card-title">Connection Info</div>
                        <div class="stats-list">
                            <div class="stat-item">
                                <span class="stat-label">Uptime</span>
                                <span class="stat-val" id="stat-uptime">00:00:00</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">IP Address</span>
                                <span class="stat-val copyable" id="stat-ip" title="Click to copy">---.---.---.---</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">Interface</span>
                                <span class="stat-val" id="stat-interface">none</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Live Logs Panel -->
                <section class="panel glass-card log-panel">
                    <div class="panel-header log-header">
                        <div class="header-left">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="panel-icon">
                                <polyline points="4 17 10 11 4 5"/>
                                <line x1="12" y1="19" x2="20" y2="19"/>
                            </svg>
                            <h2>Live Logs Monitor</h2>
                        </div>
                        <div class="header-actions">
                            <button type="button" class="btn-small" id="btn-clear-logs">Clear Logs</button>
                            <label class="checkbox-container inline">
                                <input type="checkbox" id="auto-scroll" checked>
                                <span class="checkmark"></span>
                                Auto-scroll
                            </label>
                        </div>
                    </div>
                    <div class="log-console-wrapper">
                        <pre class="log-console" id="log-console">Waiting for connection logs...</pre>
                    </div>
                </section>
            </div>
        </main>

        <!-- Notification Toast -->
        <div class="toast" id="toast">
            <span class="toast-message" id="toast-message">Notification message</span>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
